name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install .NET MAUI workload
        shell: pwsh
        run: dotnet workload install maui --ignore-failed-sources

      - name: Restore tests
        shell: pwsh
        run: dotnet restore .\MCOfflineChat.Tests\MCOfflineChat.Tests.csproj

      - name: Build offline mobile app (net9.0)
        shell: pwsh
        run: dotnet build .\MCOfflineChat.Mobile\MCOfflineChat.Mobile.csproj -c Release -f net9.0 --no-restore

      - name: Run tests
        shell: pwsh
        run: dotnet test .\MCOfflineChat.Tests\MCOfflineChat.Tests.csproj -c Release --no-restore --logger "trx;LogFileName=test-results.trx"
